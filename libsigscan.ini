[project]
description: "libsigscan is a library for binary signature scanning."
name: "libsigscan"
status: "experimental"
year_of_creation: "2014"
features: ["debug_output", "ossfuzz", "python_bindings", "tools"]

[library]
description: "Library for binary signature scanning"
features: ["pthread", "wide_character_type"]
public_types: ["scanner", "scan_result", "scan_state"]
tests: ["byte_value_group", "error", "identifier", "notify", "offset_group", "offsets_list", "pattern_weights", "scan_object", "scan_result", "scan_state", "scan_tree", "scan_tree_node", "signature", "signature_group", "signature_table", "signatures_list", "skip_table", "support", "weight_group"]
tests_with_input: ["scanner"]

[python_module]
tests: ["scanner", "support"]

[tools]
description: "Several tools for binary signature scanning files"
names: ["sigscan"]

[troubleshooting]
example: "sigscan image.raw"

[tests]
profiles: ["libsigscan", "sigscan"]

